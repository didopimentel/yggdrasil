syntax = "proto3";

package yggplane.v1;

option go_package = "github.com/didopimentel/yggdrasil/api/pb;pb";

message ServerId {
  string id = 1;
}

message Server {
  string id = 1;
  string address = 2;
  uint32 port = 3;
}

message PlayerId {
  string id = 1;
}


message Position {
  double x = 1;
  double y = 2;
  double z = 3;
}

// Generic acknowledgement for inbound operations
message ControlAck {
  bool ok = 1;
  string message = 2;
}
